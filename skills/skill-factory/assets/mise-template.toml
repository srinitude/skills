# Task graph for this skill.
# One default path per job. Local runs and remote CI both call: mise run ci

[tasks.ci]
description = "Full pipeline: all tests, structure, writing, code, evals"
run = [
  "mise run test",
  "mise run validate",
  "mise run lint-writing",
  "mise run lint-code",
  "mise run evals",
]

[tasks.test]
description = "Every test in scripts/tests/"
run = "python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v"

[tasks.validate]
description = "Static structure checks against the generation contract"
run = "python3 scripts/validate_skill.py ."

[tasks.lint-writing]
description = "Mechanical writing checks on every markdown file"
run = "python3 scripts/lint_writing.py ."

[tasks.lint-code]
description = "Size and nesting limits on every code file"
run = "python3 scripts/check_code_rules.py ."

[tasks.evals]
description = "Schema checks on evals/evals.json and evals/trigger-queries.json"
run = "python3 scripts/check_evals.py ."
