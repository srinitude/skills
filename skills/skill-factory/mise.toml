# Task graph for skill-factory.
# One default path per job. Local runs and remote CI both call: mise run ci

[tasks.ci]
description = "Full pipeline: CI contract tests, all tests, structure, writing, code, evals"
run = [
  "mise run test-ci",
  "mise run test",
  "mise run validate",
  "mise run lint-writing",
  "mise run lint-code",
  "mise run evals",
]

[tasks.test-ci]
description = "Contract tests for the task graph and the CI workflow template"
run = "python3 -m unittest discover -s scripts/tests -p 'test_ci_contract.py' -v"

[tasks.test]
description = "Every test in scripts/tests/"
run = "python3 -m unittest discover -s scripts/tests -p 'test_*.py' -v"

[tasks.validate]
description = "Static structure checks against the generation contract"
run = "python3 scripts/validate_skill.py ."

[tasks.lint-writing]
description = "Mechanical writing checks on every markdown file"
run = "python3 scripts/lint_writing.py ."

[tasks.lint-code]
description = "Size and nesting limits on every code file"
run = "python3 scripts/check_code_rules.py ."

[tasks.evals]
description = "Schema checks on evals/evals.json and evals/trigger-queries.json"
run = "python3 scripts/check_evals.py ."

[tasks.doctor]
description = "Environment readiness report"
run = "python3 scripts/doctor.py"

[tasks.new]
description = "Scaffold a new skill; pass flags after --"
run = "python3 scripts/scaffold_skill.py"
