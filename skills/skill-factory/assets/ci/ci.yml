# CI workflow template.
# Generated skills receive this file as .github/workflows/ci.yml.
# For skill-factory itself, copy this file to <repo root>/.github/workflows/ci.yml.
# Remote CI runs the same single command as local runs: mise run ci
name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run ci
