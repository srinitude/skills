name: Bug report
description: Report a reproducible package or integration problem.
title: 'bug: '
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: Client and version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the exact command and remove secrets.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Observed and expected result
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed credentials and unrelated private data.
          required: true
        - label: This is not a private security report.
          required: true
